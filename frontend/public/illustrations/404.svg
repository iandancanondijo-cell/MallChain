<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M120 80 L200 140 L120 200" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M200 80 L280 140 L200 200 L280 80" stroke="url(#grad2)" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="200" cy="140" r="65" stroke="#475569" stroke-width="2" stroke-dasharray="8 4"/>
    <circle cx="120" cy="80" r="8" fill="#6366f1"/>
    <circle cx="280" cy="80" r="8" fill="#8b5cf6"/>
    <circle cx="120" cy="200" r="8" fill="#06b6d4"/>
    <circle cx="200" cy="200" r="8" fill="#3b82f6"/>
  </g>
</svg>
