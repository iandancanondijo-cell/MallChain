syntax = "proto3";

package marketplace.mallpoints.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "marketplace/mallpoints/v1/params.proto";

option go_package = "github.com/tmp/marketplace/x/mallpoints/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // AwardPoints defines the AwardPoints RPC.
  rpc AwardPoints(MsgAwardPoints) returns (MsgAwardPointsResponse);

  // ConvertToMallcoin defines the ConvertToMallcoin RPC.
  rpc ConvertToMallcoin(MsgConvertToMallcoin) returns (MsgConvertToMallcoinResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "marketplace/x/mallpoints/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgAwardPoints defines the MsgAwardPoints message.
message MsgAwardPoints {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string recipient = 2;
  uint64 amount = 3;
  string task_type = 4;
  // pow is an opaque proof-of-work blob (e.g. hash output) produced by the client
  bytes pow = 5;
  // nonce is the numeric nonce used to produce the PoW
  uint64 nonce = 6;
}

// MsgAwardPointsResponse defines the MsgAwardPointsResponse message.
message MsgAwardPointsResponse {}

// MsgConvertToMallcoin defines the MsgConvertToMallcoin message.
message MsgConvertToMallcoin {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 amount = 2;
}

// MsgConvertToMallcoinResponse defines the MsgConvertToMallcoinResponse message.
message MsgConvertToMallcoinResponse {}
