syntax = "proto3";

package marketplace.wasm.types.v1;

option go_package = "github.com/tmp/marketplace/x/wasm/types";

import "cosmos/app/v1alpha1/module.proto";

// Module is the config object for the wasm module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/tmp/marketplace/x/wasm"};
}