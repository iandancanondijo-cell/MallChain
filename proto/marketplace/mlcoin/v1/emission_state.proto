syntax = "proto3";
package marketplace.mlcoin.v1;

option go_package = "github.com/tmp/marketplace/x/mlcoin/types";

// EmissionState defines the EmissionState message.
message EmissionState {
  uint64 total_supply = 1;
  uint64 circulating = 2;
  uint64 monthly_cap = 3;
  uint64 daily_limit = 4;
  uint64 current_month = 5;
  uint64 current_day = 6;
  
  // Tracking fields for halving schedule and burning
  uint64 emitted_total = 7;     // Total MLCNS emitted to date
  uint64 burned_total = 8;      // Total MLCNS burned to date
  string burn_wallet = 9;       // Address to receive burned coins (sent to sink)
  uint64 burn_rate_bps = 10;    // Burn rate basis points (e.g., 100 = 1% of all mints)
}
