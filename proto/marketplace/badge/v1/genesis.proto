syntax = "proto3";

package marketplace.badge.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "marketplace/badge/v1/params.proto";
import "marketplace/badge/v1/user_badge.proto";

option go_package = "github.com/tmp/marketplace/x/badge/types";

// GenesisState defines the badge module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated UserBadge user_badge_map = 2 [(gogoproto.nullable) = false];
}
