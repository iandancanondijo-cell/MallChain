syntax = "proto3";

package marketplace.vault.module.v1;

import "gogoproto/gogo.proto";
import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/tmp/marketplace/x/vault/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/tmp/marketplace/x/vault"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
