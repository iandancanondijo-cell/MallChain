syntax = "proto3";

package marketplace.marketplace.v1;

option go_package = "marketplace/x/marketplace/types";

message MsgGetEscrow {
  string escrow_id = 1;
}

message MsgGetEscrowResponse {
  string id = 1;
  string buyer = 2;
  string seller = 3;
  string amount = 4;
  string denom = 5;
  string description = 6;
  string status = 7;
  int64 created_at = 8;
  int64 release_time = 9;
  int64 dispute_window = 10;
}

message MsgListEscrows {
}

message MsgListEscrowsResponse {
  repeated MsgGetEscrowResponse escrows = 1;
}