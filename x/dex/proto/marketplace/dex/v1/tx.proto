syntax = "proto3";
package marketplace.dex.v1;

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "marketplace/dex/v1/genesis.proto";

option go_package = "marketplace/x/dex/types";

// Msg defines the dex Msg service.
service Msg {
  // CreatePool creates a new liquidity pool.
    option (cosmos.msg.v1.service) = true;
    rpc CreatePool(MsgCreatePool) returns (MsgCreatePoolResponse) {}

  // AddLiquidity adds liquidity to an existing pool.
    rpc AddLiquidity(MsgAddLiquidity) returns (MsgAddLiquidityResponse) {}

  // RemoveLiquidity removes liquidity from a pool.
    rpc RemoveLiquidity(MsgRemoveLiquidity) returns (MsgRemoveLiquidityResponse) {}

  // Swap performs a token swap.
    rpc Swap(MsgSwap) returns (MsgSwapResponse) {}

  // UpdateParams updates the module parameters.
    rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse) {}
}

// MsgCreatePool creates a new liquidity pool
message MsgCreatePool {
  option (cosmos.msg.v1.signer) = "creator";

  // creator is the address creating the pool.
  string creator = 1;

  // token_a is the first token in the pool.
  cosmos.base.v1beta1.Coin token_a = 2 [(gogoproto.nullable) = false];

  // token_b is the second token in the pool.
  cosmos.base.v1beta1.Coin token_b = 3 [(gogoproto.nullable) = false];

  // fee is the swap fee (e.g., 0.003 for 0.3%).
  string fee = 4;
}

// MsgCreatePoolResponse is the response type for MsgCreatePool.
message MsgCreatePoolResponse {
  // pool_id is the ID of the created pool.
  uint64 pool_id = 1;
}

// MsgAddLiquidity adds liquidity to an existing pool
message MsgAddLiquidity {
  option (cosmos.msg.v1.signer) = "provider";

  // provider is the address providing liquidity.
  string provider = 1;

  // pool_id is the ID of the pool to add liquidity to.
  uint64 pool_id = 2;

  // token_a_amount is the amount of token A to add.
  cosmos.base.v1beta1.Coin token_a_amount = 3 [(gogoproto.nullable) = false];

  // token_b_amount is the amount of token B to add.
  cosmos.base.v1beta1.Coin token_b_amount = 4 [(gogoproto.nullable) = false];
}

// MsgAddLiquidityResponse is the response type for MsgAddLiquidity.
message MsgAddLiquidityResponse {
  // liquidity_tokens is the amount of liquidity tokens minted.
  cosmos.base.v1beta1.Coin liquidity_tokens = 1 [(gogoproto.nullable) = false];
}

// MsgRemoveLiquidity removes liquidity from a pool
message MsgRemoveLiquidity {
  option (cosmos.msg.v1.signer) = "provider";

  // provider is the address removing liquidity.
  string provider = 1;

  // pool_id is the ID of the pool to remove liquidity from.
  uint64 pool_id = 2;

  // liquidity_tokens is the amount of liquidity tokens to burn.
  cosmos.base.v1beta1.Coin liquidity_tokens = 3 [(gogoproto.nullable) = false];
}

// MsgRemoveLiquidityResponse is the response type for MsgRemoveLiquidity.
message MsgRemoveLiquidityResponse {
  // token_a_amount is the amount of token A returned.
  cosmos.base.v1beta1.Coin token_a_amount = 1 [(gogoproto.nullable) = false];

  // token_b_amount is the amount of token B returned.
  cosmos.base.v1beta1.Coin token_b_amount = 2 [(gogoproto.nullable) = false];
}

// MsgSwap performs a token swap
message MsgSwap {
  option (cosmos.msg.v1.signer) = "sender";

  // sender is the address performing the swap.
  string sender = 1;

  // pool_id is the ID of the pool to swap in.
  uint64 pool_id = 2;

  // token_in is the token being swapped in.
  cosmos.base.v1beta1.Coin token_in = 3 [(gogoproto.nullable) = false];

  // token_out_denom is the denomination of the token being swapped out.
  string token_out_denom = 4;

  // min_token_out is the minimum amount of token out (slippage protection).
  cosmos.base.v1beta1.Coin min_token_out = 5 [(gogoproto.nullable) = false];
}

// MsgSwapResponse is the response type for MsgSwap.
message MsgSwapResponse {
  // token_out is the amount of token received.
  cosmos.base.v1beta1.Coin token_out = 1 [(gogoproto.nullable) = false];
}

// MsgUpdateParams updates the module parameters
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address authorized to update parameters.
  string authority = 1;

  // params are the new parameters.
  Params params = 2 [(gogoproto.nullable) = false];
}

// MsgUpdateParamsResponse is the response type for MsgUpdateParams.
message MsgUpdateParamsResponse {}