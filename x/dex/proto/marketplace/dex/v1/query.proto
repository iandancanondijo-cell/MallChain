syntax = "proto3";

package marketplace.dex.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "marketplace/dex/v1/genesis.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "marketplace/x/dex/types";

// Query defines the gRPC querier service.
service Query {

  // Pool queries a specific liquidity pool.
  rpc Pool(QueryPoolRequest) returns (QueryPoolResponse) {}

  // Pools queries all liquidity pools with pagination.
  rpc Pools(QueryPoolsRequest) returns (QueryPoolsResponse) {}

  // PoolLiquidity queries liquidity for a specific pool.
  rpc PoolLiquidity(QueryPoolLiquidityRequest) returns (QueryPoolLiquidityResponse) {}

  // EstimateSwap estimates the result of a token swap.
  rpc EstimateSwap(QueryEstimateSwapRequest) returns (QueryEstimateSwapResponse) {}

  // Params queries all parameters of the dex module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {}
}

// QueryPoolRequest is the request type for the Query/Pool RPC method.
message QueryPoolRequest {
  // pool_id defines the unique id of the pool.
  uint64 pool_id = 1 [(gogoproto.moretags) = "yaml:\"pool_id\""];
}

// QueryPoolResponse is the response type for the Query/Pool RPC method.
message QueryPoolResponse {
  // pool is the requested pool.
  Pool pool = 1 [(gogoproto.nullable) = false];
}

// QueryPoolsRequest is the request type for the Query/Pools RPC method.
message QueryPoolsRequest {
  // pagination defines an optional pagination for the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryPoolsResponse is the response type for the Query/Pools RPC method.
message QueryPoolsResponse {
  // pools defines all the queried pools.
  repeated Pool pools = 1 [(gogoproto.nullable) = false];

  // pagination defines the pagination in the response.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryPoolLiquidityRequest is the request type for the Query/PoolLiquidity RPC method.
message QueryPoolLiquidityRequest {
  // pool_id defines the unique id of the pool.
  uint64 pool_id = 1 [(gogoproto.moretags) = "yaml:\"pool_id\""];

  // address is the address to query liquidity for.
  string address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// QueryPoolLiquidityResponse is the response type for the Query/PoolLiquidity RPC method.
message QueryPoolLiquidityResponse {
  // liquidity is the liquidity amount for the address in the pool.
  cosmos.base.v1beta1.Coin liquidity = 1 [(gogoproto.nullable) = false];
}

// QueryEstimateSwapRequest is the request type for the Query/EstimateSwap RPC method.
message QueryEstimateSwapRequest {
  // pool_id defines the unique id of the pool.
  uint64 pool_id = 1 [(gogoproto.moretags) = "yaml:\"pool_id\""];

  // token_in is the token being swapped in.
  cosmos.base.v1beta1.Coin token_in = 2 [(gogoproto.nullable) = false];

  // token_out_denom is the denomination of the token being swapped out.
  string token_out_denom = 3;
}

// QueryEstimateSwapResponse is the response type for the Query/EstimateSwap RPC method.
message QueryEstimateSwapResponse {
  // token_out is the estimated amount of token out.
  cosmos.base.v1beta1.Coin token_out = 1 [(gogoproto.nullable) = false];

  // fee is the swap fee amount.
  cosmos.base.v1beta1.Coin fee = 2 [(gogoproto.nullable) = false];
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false];
}

// Reuse Pool, Params, and GenesisState from genesis.proto
// (definitions live in marketplace/dex/v1/genesis.proto)